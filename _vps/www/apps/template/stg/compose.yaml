services:
  backend:
    container_name: ${ENV}-backend
    image: valhallacode/boilerplate-backend
    healthcheck:
      test: [
          "CMD-SHELL",
          'curl -m 5
          --fail
          --request POST
          --header ''Content-Type: application/json''
          --url ''http://backend:${SERVICE_PORT}/api''
          --data ''{"query":"query { __typename }"}''
          || exit 1',
        ]
    depends_on:
      database:
        condition: service_healthy
    environment:
      SERVICE_PORT: ${SERVICE_PORT}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}

  database:
    container_name: ${ENV}-database
    image: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE} -U ${DB_USER}"]
    volumes:
      - ./persist/database:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_HOST: ${DB_HOST}

  frontend: # + gateway
    container_name: ${ENV}-frontend
    image: valhallacode/boilerplate-frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -m 5 --fail --request GET --url 'http://frontend:${SERVICE_PORT}' || exit 1",
        ]
    ports:
      - ${GATEWAY_PORT}:80
    environment:
      SERVICE_PORT: ${SERVICE_PORT}
      VITE_PORT: ${SERVICE_PORT} # necessaire ?
      GATEWAY_PORT: ${GATEWAY_PORT}
    depends_on:
      backend:
        condition: service_healthy
