name: All unit/integration/e2e Tests

on:
  pull_request:
    branches:
      - staging
    types: [opened, reopened, synchronize]

jobs:
  test-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        services:
          - frontend
          - backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run ${{ matrix.services }} tests
        working-directory: ${{ matrix.services }}
        run: |
          npm ci
          npm run test

  test-e2e:
    runs-on: ubuntu-latest
    needs: test-services
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Build and Run E2E Tests
        working-directory: _env/e2e/
        run: |
          docker compose run playwright

      - name: Teardown E2E environment
        if: always() # Even if tests fail
        run: docker compose down
