services:
  backend:
    container_name: ${ENV}-backend
    build:
      context: ../..
      dockerfile: _env/dev/Dockerfile.backend
    healthcheck:
      test: [
          "CMD-SHELL",
          'curl -m 5
          --fail
          --request POST
          --header ''Content-Type: application/json''
          --url ''http://backend:${SERVICE_PORT}/api''
          --data ''{"query":"query { __typename }"}''
          || exit 1',
        ]
    depends_on:
      database:
        condition: service_healthy
    environment:
      SERVICE_PORT: ${SERVICE_PORT}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}

  database:
    container_name: ${ENV}-database
    image: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE} -U ${DB_USER}"]
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_HOST: ${DB_HOST}

  gateway:
    container_name: ${ENV}-gateway
    image: nginx
    volumes: # useless in theory
      - ./nginx/:/etc/nginx/templates/
    ports:
      - ${GATEWAY_PORT}:80
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      SERVICE_PORT: ${SERVICE_PORT}

  frontend:
    container_name: ${ENV}-frontend
    build:
      context: ../..
      dockerfile: _env/dev/Dockerfile.frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -m 5 --fail --request GET --url 'http://frontend:${SERVICE_PORT}' || exit 1",
        ]
    environment:
      CHOKIDAR_USEPOLLING: true # Windows limitation
      VITE_PORT: ${SERVICE_PORT}
      GATEWAY_PORT: ${GATEWAY_PORT}
    depends_on:
      backend:
        condition: service_healthy

  playwright:
    container_name: ${ENV}-playwright
    build:
      context: ../../
      dockerfile: _env/${ENV}/Dockerfile.e2e
    volumes:
      - ./persist/playwright/report:/app/playwright-report
      - ./persist/playwright/results:/app/tests-results
    depends_on:
      gateway:
        condition: service_started
    environment:
      WEBSITE_URL: http://gateway
