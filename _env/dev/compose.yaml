services:
  backend:
    container_name: ${ENV}-backend
    build:
      context: ../..
      dockerfile: _env/${ENV}/Dockerfile.backend
    volumes:
      - ../../backend/src:/app/src/
    healthcheck:
      test: [
          "CMD-SHELL",
          'curl -m 5
          --fail
          --request POST
          --header ''Content-Type: application/json''
          --url ''http://backend:${SERVICE_PORT}/api''
          --data ''{"query":"query { __typename }"}''
          || exit 1',
        ]
    depends_on:
      database:
        condition: service_healthy
    environment:
      SERVICE_PORT: ${SERVICE_PORT}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}

  database:
    container_name: ${ENV}-database
    image: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE} -U ${DB_USER}"]
    volumes:
      - ./persist/database:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_HOST: ${DB_HOST}

  gateway:
    container_name: ${ENV}-gateway
    image: nginx
    volumes:
      - ./nginx/:/etc/nginx/templates/
    ports:
      - ${GATEWAY_PORT}:80
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      adminer:
        condition: service_healthy
    environment:
      SERVICE_PORT: ${SERVICE_PORT}

  frontend:
    container_name: ${ENV}-frontend
    build:
      context: ../..
      dockerfile: _env/${ENV}/Dockerfile.frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -m 5 --fail --request GET --url 'http://frontend:${SERVICE_PORT}' || exit 1",
        ]
    volumes:
      - ../../frontend/src:/app/src/
    environment:
      CHOKIDAR_USEPOLLING: true # Windows limitation
      VITE_PORT: ${SERVICE_PORT}
      GATEWAY_PORT: ${GATEWAY_PORT}
    depends_on:
      backend:
        condition: service_healthy

  adminer:
    container_name: ${ENV}-adminer
    image: adminer
    depends_on:
      database:
        condition: service_healthy
    command:
      [
        "php",
        "-d",
        "post_max_size=${UPLOAD_SIZE}",
        "-d",
        "upload_max_filesize=${UPLOAD_SIZE}",
        "-S",
        "0.0.0.0:${SERVICE_PORT}",
        "-t",
        "/var/www/html",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -m 5 --fail --request GET --url 'http://adminer:${SERVICE_PORT}' || exit 1",
        ]
